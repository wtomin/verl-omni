# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"
  jobs:
    # Install pinned heavy deps and base runtime deps before RTD's docs step.
    pre_install:
      - pip install --extra-index-url https://download.pytorch.org/whl/cpu "https://github.com/vllm-project/vllm/releases/download/v0.22.0/vllm-0.22.0+cpu-cp38-abi3-manylinux_2_34_x86_64.whl"
      - pip install "vllm-omni==0.22.0"
      - pip install --no-deps "verl @ git+https://github.com/verl-project/verl.git@$(cat .github/verl_pin.txt)"
      - pip install -e .

sphinx:
  configuration: docs/conf.py

python:
  install:
    - requirements: docs/requirements-docs.txt
