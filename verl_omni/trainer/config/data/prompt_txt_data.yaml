# Prompt-only DPO dataset config.

# Tokenizer class or path. If null, it will be inferred from the model.
tokenizer: null

# Whether to use shared memory for data loading.
use_shm: False

# Training prompt parquet file.
train_files: dataset/pickscore/train.parquet

# Validation prompt parquet file.
val_files: dataset/pickscore/test.parquet

# Maximum number of training samples. -1 uses the full dataset.
train_max_samples: -1

# Maximum number of validation samples. -1 uses the full dataset.
val_max_samples: 100

# Dataset field containing the prompt messages.
prompt_key: prompt

# Dataset field containing the negative prompt messages.
negative_prompt_key: negative_prompt

# Dataset field used to select reward functions.
reward_fn_key: data_source

# Maximum prompt length for padding token ids passed through the agent loop.
max_prompt_length: 512

# Maximum response length placeholder for compatibility with upstream RLHF dataset configs.
max_response_length: 512

# Number of unique prompts sampled for one generation step.
gen_batch_size: 4

# Number of rollout samples per prompt used for DPO pair construction.
k_samples: 4

# Batch size used for actor updates.
train_batch_size: 4

# Optional validation batch size.
val_batch_size: null

# Tool config path for multi-turn datasets.
tool_config_path: ${oc.select:actor_rollout_ref.rollout.multi_turn.tool_config_path, null}

# Whether to return original token ids without applying chat template.
return_raw_input_ids: False

# Whether to keep raw chat messages for rollout and reward scoring.
return_raw_chat: True

# Whether to return the fully templated prompt.
return_full_prompt: False

# Whether to shuffle the training data.
shuffle: True

# Seed used when shuffling the dataset.
seed: null

# Number of dataloader workers.
dataloader_num_workers: 0

# Image patch size placeholder for multimodal dataset compatibility.
image_patch_size: 14

# Whether to shuffle validation data.
validation_shuffle: False

# Whether to filter overlong prompts before training.
filter_overlong_prompts: False

# Number of workers used for overlong prompt filtering.
filter_overlong_prompts_workers: 1

# Prompt truncation strategy.
truncation: error

# Dataset field containing input images, if any.
image_key: images

# Dataset field containing input videos, if any.
video_key: videos

# Whether to trust remote tokenizer or processor code.
trust_remote_code: False

# Optional custom dataset class configuration.
custom_cls:

  # Path to a Python file containing a custom dataset class.
  path: null

  # Name of the custom dataset class.
  name: null

# Whether to return multimodal inputs from the dataset.
return_multi_modal_inputs: True

# Sampler configuration.
sampler:

  # Module path containing a custom sampler class.
  class_path: null

  # Name of the custom sampler class.
  class_name: null

# Dynamic data generation configuration.
datagen:

  # Path to a Python file containing a dynamic data generator.
  path: null

  # Name of the dynamic data generator class.
  name: null

# Additional kwargs for tokenizer.apply_chat_template.
apply_chat_template_kwargs: {}
