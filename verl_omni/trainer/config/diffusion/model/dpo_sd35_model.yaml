# Format checks enforced on CI:
# 1. Comments must appear above each field.
# 2. There must be a blank line between each field.
# 3. Inline comments (after a field on the same line) are not allowed.
# 4. Indentation level is respected for nested fields.

# Target class for this configuration
_target_: verl_omni.workers.config.diffusion.DiffusionModelConfig

# Stable Diffusion 3.5 Medium checkpoint
path: stabilityai/stable-diffusion-3.5-medium

# RL algorithm name
algorithm: dpo

# Pipeline architecture name from model_index.json
architecture: StableDiffusion3Pipeline

# Path to the tokenizer. Null means infer it from the model path.
tokenizer_path: null

# Whether to use shared memory for model loading.
use_shm: False

# Whether to trust remote code.
trust_remote_code: False

# Custom chat template. SD3 DPO uses raw prompt text, so keep this disabled.
custom_chat_template: null

# Import SD3 DPO adapter registrations for training.
external_lib: verl_omni.pipelines.sd3_dpo

# Whether to enable gradient checkpointing.
enable_gradient_checkpointing: True

# Diffusers attention backend. Supported: "native"
attn_backend: native

# LoRA rank for SD3 DPO training.
lora_rank: 32

# LoRA scaling factor.
lora_alpha: 64

# LoRA initialization method.
lora_init_weights: gaussian

# Target modules for LoRA adaptation.
target_modules: all-linear

# Target parameters for LoRA adaptation.
target_parameters: null

# Exclude modules from LoRA adaptation.
exclude_modules: null

# Path to a pre-trained LoRA adapter for continued training.
lora_adapter_path: null

# MTP configuration placeholder.
mtp:

  # Required when using verl.utils.omega_conf_to_dataclass to instantiate dataclass configs
  _target_: verl.workers.config.MtpConfig

  # Whether to enable MTP.
  enable: False

# Pipeline configuration for SD3.5 generation and training.
pipeline:

  # Required when using verl.utils.omega_conf_to_dataclass to instantiate dataclass configs
  _target_: verl_omni.workers.config.diffusion.DiffusionPipelineConfig

  # Image height.
  height: ${oc.select:actor_rollout_ref.rollout.pipeline.height,512}

  # Image width.
  width: ${oc.select:actor_rollout_ref.rollout.pipeline.width,512}

  # Number of inference steps.
  num_inference_steps: ${oc.select:actor_rollout_ref.rollout.pipeline.num_inference_steps,40}

  # Classifier-free guidance scale. DPO defaults to no CFG.
  true_cfg_scale: ${oc.select:actor_rollout_ref.rollout.pipeline.true_cfg_scale,1.0}

  # Maximum SD3 text encoder sequence length.
  max_sequence_length: ${oc.select:actor_rollout_ref.rollout.pipeline.max_sequence_length,256}

  # SD3 guidance scale used during rollout.
  guidance_scale: ${oc.select:actor_rollout_ref.rollout.pipeline.guidance_scale,1.0}

# Rollout algorithm configuration placeholder. DPO does not use SDE windows.
algo:

  # Required when using verl.utils.omega_conf_to_dataclass to instantiate dataclass configs
  _target_: verl_omni.workers.config.diffusion.DiffusionRolloutAlgoConfig

  # SDE noise level is unused for DPO.
  noise_level: 0.0

  # SDE type placeholder.
  sde_type: sde

  # DPO does not select a denoising window.
  sde_window_size: null

  # DPO does not select a denoising window range.
  sde_window_range: null
