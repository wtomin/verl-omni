# Model configuration for SD3 (Stable Diffusion 3.x) DPO training
# This config is used by dpo_trainer.yaml (Hydra group: diffusion/model)

# Required when using verl.utils.omega_conf_to_dataclass to instantiate dataclass configs
_target_: verl_omni.workers.config.diffusion.DiffusionModelConfig

# Default checkpoint (SD3.5 medium); override with SD3.0 weights if desired
path: "stabilityai/stable-diffusion-3.5-medium"

# Model type must be "diffusion_model" for verl-omni
model_type: "diffusion_model"

# Architecture name must match registered name in DiffusionModelBase
# "StableDiffusion3Pipeline" is registered in pipelines/sd3/diffusers_training_adapter.py
architecture: "StableDiffusion3Pipeline"

# path to the huggingface tokenizer. In case it is not the same as path
tokenizer_path: null

# whether to use shared memory for model loading
use_shm: False

# whether to trust remote code.
trust_remote_code: False

# LoRA configuration
lora:

  rank: 32

  alpha: 64

  enable: true

  merge: false

# Pipeline settings
pipeline:

  # Required when using verl.utils.omega_conf_to_dataclass to instantiate dataclass configs
  _target_: verl_omni.workers.config.diffusion.DiffusionPipelineConfig

  height: 512

  width: 512

  num_inference_steps: 40

  guidance_scale: 1.0

  true_cfg_scale: 1.0

# Trust remote code (may be needed for some models)
trust_remote_code: false
