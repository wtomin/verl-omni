# Format checks enforced on CI:
# 1. Comments must appear above each field.
# 2. There must be a blank line between each field.
# 3. Inline comments (after a field on the same line) are not allowed.
# 4. Indentation level is respected for nested fields.

# Target class for this configuration
_target_: verl_omni.workers.config.omni.OmniModelConfig

# Path to the HuggingFace model.
path: ~/models/Qwen/Qwen3-Omni-30B-A3B-Thinking

# Model architecture key used to select the omni training adapter.
architecture: Qwen3OmniMoeForConditionalGeneration

# Training algorithm key used to select the omni training adapter.
algorithm: dpo

# Model type used to select the Omni trainer and worker path.
model_type: omni_model

# Optional config path. Defaults to path when null.
config_path: null

# Optional model weight path. Defaults to path when null.
model_path: null

# Optional tokenizer path. Defaults to path when null.
tokenizer_path: null

# Local model path resolved at runtime.
local_path: null

# Local tokenizer path resolved at runtime.
local_tokenizer_path: null

# Whether to load the tokenizer and processor.
load_tokenizer: true

# Whether to use shared memory for model loading.
use_shm: false

# Whether to trust remote code.
trust_remote_code: true

# Custom chat template for the model.
custom_chat_template: null

# External library to import before loading the model.
external_lib:
  - verl_omni.models.transformers.qwen3_omni_thinker
  - verl_omni.pipelines.qwen3_omni_dpo

# Whether to enable gradient checkpointing.
enable_gradient_checkpointing: true

# Whether to balance encoder data across ranks.
encoder_data_balance: false

# Encoder data balancing sorting algorithm.
encoder_data_balance_sorting_algo: local

# Basic module names used by the VeOmni model.
basic_modules: []

# Extra model configuration passed to the VeOmni model loader.
model_config: {}

# Optional VeOmni ops implementation override.
ops_implementation: null

# Set to positive value to enable LoRA.
lora_rank: 0

# LoRA scaling factor.
lora_alpha: 64

# LoRA initialization method.
lora_init_weights: gaussian

# Target modules for LoRA adaptation.
target_modules: all-linear

# Target parameters for LoRA adaptation.
target_parameters: null

# Exclude modules from LoRA adaptation.
exclude_modules: null

# Extra LoRA configuration passed to the model loader.
lora: {}

# Path to a pre-trained LoRA adapter.
lora_adapter_path: null

# Named LoRA policy states required by the algorithm.
policy_state_adapters: ["default"]

# Convert LoRA parameters to a target dtype for numerical stability.
lora_dtype: null

# FSDP layer name prefixes for LoRA parameter layered summon.
fsdp_layer_prefixes: ["thinker.model.layers."]

# MTP config.
mtp:

  # Required when using verl.utils.omega_conf_to_dataclass to instantiate dataclass configs
  _target_: verl.workers.config.MtpConfig

  # Whether to enable MTP
  enable: false
