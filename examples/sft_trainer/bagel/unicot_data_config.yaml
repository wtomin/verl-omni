# Uni-COT / BAGEL SFT data mix.
#
# This mirrors the task grouping used by BAGEL's native training config:
# T2I generation, unified image editing, and VLM supervised fine-tuning.
# The verl-omni dataset reads this file for task metadata; heavy image
# transforms and VAE/ViT preprocessing should be materialized offline into
# optional tensor columns when needed.

t2i_pretrain:
  task_type: t2i
  dataset_names:
    - unicot_t2i
  image_transform_args:
    image_stride: 16
    max_image_size: 1024
    min_image_size: 512
  is_mandatory: true
  num_used_data:
    - 1000
  weight: 1

unified_edit:
  task_type: editing
  dataset_names:
    - unicot_editing
  image_transform_args:
    image_stride: 16
    max_image_size: 1024
    min_image_size: 512
  vit_image_transform_args:
    image_stride: 14
    max_image_size: 518
    min_image_size: 224
  is_mandatory: false
  num_used_data:
    - 1000
  weight: 1

vlm_sft:
  task_type: vlm_sft
  dataset_names:
    - unicot_vlm
  image_transform_args:
    image_stride: 14
    max_image_size: 980
    min_image_size: 378
    max_pixels: 2_007_040
  frame_sampler_args:
    max_num_frames: 12
    min_num_frames: 8
  is_mandatory: true
  shuffle_lines: true
  shuffle_seed: 0
  num_used_data:
    - 1000
  weight: 1
