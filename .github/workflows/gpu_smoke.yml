name: gpu_smoke

on:
  push:
    branches:
      - main
      - v0.*
    paths:
      - "verl_omni/**"
      - "tests/gpu_smoke/**"
      - "tests/agent_loop/**"
      - "tests/reward_loop/**"
      - "tests/workers/**"
      - "tests/special_e2e/**"
      - "pyproject.toml"
      - .github/workflows/gpu_smoke.yml
      - .github/vllm_omni_pin.txt
      - .github/actions/gpu-smoke-prepare/**
      - .github/actions/gpu-smoke-upload-logs/**
  pull_request:
    branches:
      - main
      - v0.*
    types: [labeled, synchronize]
    paths:
      - "verl_omni/**"
      - "tests/gpu_smoke/**"
      - "tests/agent_loop/**"
      - "tests/reward_loop/**"
      - "tests/workers/**"
      - "tests/special_e2e/**"
      - "pyproject.toml"
      - .github/workflows/gpu_smoke.yml
      - .github/vllm_omni_pin.txt
      - .github/actions/gpu-smoke-prepare/**
      - .github/actions/gpu-smoke-upload-logs/**

# Cancel jobs on the same ref if a new one is triggered
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Declare permissions just read content.
permissions:
  contents: read

env:
  IMAGE: "verl-ci-cn-beijing.cr.volces.com/verlai/verl:vllm023.dev1"
  DYNAMIC_RUNNER_ENDPOINT: "https://sd7upeujs1b9g1a958pn0.apigateway-cn-beijing.volceapi.com/runner"
  HTTPS_PROXY: ${{ secrets.PROXY_HTTPS }}
  NO_PROXY: "localhost,127.0.0.1,hf-mirror.com"
  HF_ENDPOINT: "https://hf-mirror.com"
  HF_HUB_ENABLE_HF_TRANSFER: "0"

jobs:
  setup_runner:
    # Pull request label mapping:
    #   ready-for-ci               -> all GPU smoke groups in parallel on one 8-GPU runner
    #   gpu-smoke-core             -> core group on one 2-GPU runner
    #   gpu-smoke-e2e              -> e2e group only
    #   gpu-smoke-reward-e2e       -> reward e2e group only
    # Push events also run all groups on one 8-GPU runner.
    if: github.repository_owner == 'verl-project'
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.resolve-mode.outputs.mode }}
      runner-label: ${{ steps.create-runner.outputs.runner-label }}
      mlp-task-id: ${{ steps.create-runner.outputs.mlp-task-id }}
    steps:
      - id: resolve-mode
        run: |
          mode="none"
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            mode="all"
          elif [[ "${{ contains(github.event.pull_request.labels.*.name, 'ready-for-ci') }}" == "true" ]]; then
            mode="all"
          elif [[ "${{ contains(github.event.pull_request.labels.*.name, 'gpu-smoke-core') }}" == "true" ]]; then
            mode="core"
          elif [[ "${{ contains(github.event.pull_request.labels.*.name, 'gpu-smoke-e2e') }}" == "true" ]]; then
            mode="e2e"
          elif [[ "${{ contains(github.event.pull_request.labels.*.name, 'gpu-smoke-reward-e2e') }}" == "true" ]]; then
            mode="reward-e2e"
          fi
          echo "mode=${mode}" >> "$GITHUB_OUTPUT"
      - id: create-runner
        if: steps.resolve-mode.outputs.mode != 'none'
        uses: volcengine/vemlp-github-runner@v1
        with:
          mode: "create"
          faas-url: "${{ env.DYNAMIC_RUNNER_ENDPOINT }}"
          mlp-image: "${{ env.IMAGE }}"

  gpu_smoke:
    needs: setup_runner
    if: needs.setup_runner.outputs.mode != 'none'
    runs-on: ["${{ needs.setup_runner.outputs.runner-label || (needs.setup_runner.outputs.mode == 'reward-e2e' && 'L20x4' || needs.setup_runner.outputs.mode == 'all' && 'L20x8' || 'L20x2') }}"]
    timeout-minutes: ${{ needs.setup_runner.outputs.mode == 'all' && 90 || 45 }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: ./.github/actions/gpu-smoke-prepare
      - name: Run selected GPU smoke tests
        run: |
          mode="${{ needs.setup_runner.outputs.mode }}"
          ray stop --force || true
          case "${mode}" in
            all)
              set -euo pipefail
              mkdir -p logs/gpu_smoke/parallel

              pids=()
              names=()

              run_group() {
                local name="$1"
                local devices="$2"
                local num_gpus="$3"
                local script="$4"
                local logfile="logs/gpu_smoke/parallel/${name}.log"

                echo "Starting ${name} on CUDA_VISIBLE_DEVICES=${devices}; log=${logfile}"
                GPU_SMOKE_SKIP_RAY_STOP=1 bash "${script}" \
                  --num-gpus "${num_gpus}" \
                  --cuda-visible-devices "${devices}" \
                  > "${logfile}" 2>&1 &
                pids+=("$!")
                names+=("${name}")
              }

              run_group core "0,1" 2 tests/gpu_smoke/run_gpu_smoke_core.sh
              run_group e2e "2,3" 2 tests/gpu_smoke/run_gpu_smoke_e2e.sh
              run_group reward-e2e "4,5,6,7" 4 tests/gpu_smoke/run_gpu_smoke_reward_e2e.sh

              failed=0
              for i in "${!pids[@]}"; do
                if wait "${pids[$i]}"; then
                  echo "[PASS] ${names[$i]}"
                else
                  echo "[FAIL] ${names[$i]}"
                  failed=1
                fi
              done

              ray stop --force || true
              exit "${failed}"
              ;;
            core)
              bash tests/gpu_smoke/run_gpu_smoke_core.sh --num-gpus 2
              ;;
            e2e)
              bash tests/gpu_smoke/run_gpu_smoke_e2e.sh --num-gpus 2
              ;;
            reward-e2e)
              bash tests/gpu_smoke/run_gpu_smoke_reward_e2e.sh --num-gpus 4
              ;;
            *)
              echo "Unsupported smoke mode: ${mode}"
              exit 1
              ;;
          esac
      - if: always()
        uses: ./.github/actions/gpu-smoke-upload-logs

  cleanup:
    runs-on: ubuntu-latest
    needs:
      - setup_runner
      - gpu_smoke
    if: always()
    steps:
      - id: destroy-runner
        if: needs.setup_runner.outputs.mlp-task-id != ''
        uses: volcengine/vemlp-github-runner@v1
        with:
          mode: "destroy"
          faas-url: "${{ env.DYNAMIC_RUNNER_ENDPOINT }}"
          mlp-task-id: "${{ needs.setup_runner.outputs.mlp-task-id }}"
