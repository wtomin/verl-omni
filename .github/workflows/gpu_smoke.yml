name: gpu_smoke

on:
  push:
    branches:
      - main
      - v0.*
    paths:
      - "verl_omni/**"
      - "tests/gpu_smoke/**"
      - "tests/agent_loop/**"
      - "tests/reward_loop/**"
      - "tests/workers/**"
      - "tests/special_e2e/**"
      - "pyproject.toml"
      - .github/workflows/gpu_smoke.yml
      - .github/vllm_omni_pin.txt
      - .github/actions/gpu-smoke-prepare/**
      - .github/actions/gpu-smoke-upload-logs/**
  pull_request:
    branches:
      - main
      - v0.*
    types: [labeled, synchronize]
    paths:
      - "verl_omni/**"
      - "tests/gpu_smoke/**"
      - "tests/agent_loop/**"
      - "tests/reward_loop/**"
      - "tests/workers/**"
      - "tests/special_e2e/**"
      - "pyproject.toml"
      - .github/workflows/gpu_smoke.yml
      - .github/vllm_omni_pin.txt
      - .github/actions/gpu-smoke-prepare/**
      - .github/actions/gpu-smoke-upload-logs/**

# Cancel jobs on the same ref if a new one is triggered
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Declare permissions just read content.
permissions:
  contents: read

env:
  IMAGE: "verl-ci-cn-beijing.cr.volces.com/verlai/verl:vllm023.dev1"
  DYNAMIC_RUNNER_ENDPOINT: "https://sd7upeujs1b9g1a958pn0.apigateway-cn-beijing.volceapi.com/runner"
  HTTPS_PROXY: ${{ secrets.PROXY_HTTPS }}
  NO_PROXY: "localhost,127.0.0.1,hf-mirror.com"
  HF_ENDPOINT: "https://hf-mirror.com"
  HF_HUB_ENABLE_HF_TRANSFER: "0"

jobs:
  setup_all_runner:
    # Pull request label mapping:
    #   ready-for-ci               -> all GPU smoke groups in parallel on one 8-GPU runner
    #   gpu-smoke-core             -> core group on one 2-GPU runner
    #   gpu-smoke-e2e              -> e2e group only
    #   gpu-smoke-reward-e2e       -> reward e2e group only
    # Push events also run all groups on one 8-GPU runner.
    if: >-
      github.repository_owner == 'verl-project' && (
        github.event_name != 'pull_request' ||
        contains(github.event.pull_request.labels.*.name, 'ready-for-ci')
      )
    runs-on: ubuntu-latest
    outputs:
      all-runner-label: ${{ steps.create-all-runner.outputs.runner-label }}
      all-mlp-task-id: ${{ steps.create-all-runner.outputs.mlp-task-id }}
    steps:
      - id: create-all-runner
        uses: volcengine/vemlp-github-runner@v1
        with:
          mode: "create"
          faas-url: "${{ env.DYNAMIC_RUNNER_ENDPOINT }}"
          mlp-image: "${{ env.IMAGE }}"

  setup_core_runner:
    if: >-
      github.repository_owner == 'verl-project' &&
      github.event_name == 'pull_request' &&
      !contains(github.event.pull_request.labels.*.name, 'ready-for-ci') &&
      contains(github.event.pull_request.labels.*.name, 'gpu-smoke-core')
    runs-on: ubuntu-latest
    outputs:
      core-runner-label: ${{ steps.create-core-runner.outputs.runner-label }}
      core-mlp-task-id: ${{ steps.create-core-runner.outputs.mlp-task-id }}
    steps:
      - id: create-core-runner
        uses: volcengine/vemlp-github-runner@v1
        with:
          mode: "create"
          faas-url: "${{ env.DYNAMIC_RUNNER_ENDPOINT }}"
          mlp-image: "${{ env.IMAGE }}"

  setup_e2e_runner:
    if: >-
      github.repository_owner == 'verl-project' &&
      github.event_name == 'pull_request' &&
      !contains(github.event.pull_request.labels.*.name, 'ready-for-ci') &&
      contains(github.event.pull_request.labels.*.name, 'gpu-smoke-e2e')
    runs-on: ubuntu-latest
    outputs:
      e2e-runner-label: ${{ steps.create-e2e-runner.outputs.runner-label }}
      e2e-mlp-task-id: ${{ steps.create-e2e-runner.outputs.mlp-task-id }}
    steps:
      - id: create-e2e-runner
        uses: volcengine/vemlp-github-runner@v1
        with:
          mode: "create"
          faas-url: "${{ env.DYNAMIC_RUNNER_ENDPOINT }}"
          mlp-image: "${{ env.IMAGE }}"

  setup_reward_e2e_runner:
    if: >-
      github.repository_owner == 'verl-project' &&
      github.event_name == 'pull_request' &&
      !contains(github.event.pull_request.labels.*.name, 'ready-for-ci') &&
      contains(github.event.pull_request.labels.*.name, 'gpu-smoke-reward-e2e')
    runs-on: ubuntu-latest
    outputs:
      reward-e2e-runner-label: ${{ steps.create-reward-e2e-runner.outputs.runner-label }}
      reward-e2e-mlp-task-id: ${{ steps.create-reward-e2e-runner.outputs.mlp-task-id }}
    steps:
      - id: create-reward-e2e-runner
        uses: volcengine/vemlp-github-runner@v1
        with:
          mode: "create"
          faas-url: "${{ env.DYNAMIC_RUNNER_ENDPOINT }}"
          mlp-image: "${{ env.IMAGE }}"

  gpu_smoke_all_8gpu:
    needs: setup_all_runner
    if: >-
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'ready-for-ci')
    runs-on: ["${{ needs.setup_all_runner.outputs.all-runner-label || 'L20x8' }}"]
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: ./.github/actions/gpu-smoke-prepare
      - name: Run all GPU smoke groups in parallel
        run: |
          set -euo pipefail

          ray stop --force || true
          mkdir -p logs/gpu_smoke/parallel

          pids=()
          names=()

          run_group() {
            local name="$1"
            local devices="$2"
            local num_gpus="$3"
            local script="$4"
            local logfile="logs/gpu_smoke/parallel/${name}.log"

            echo "Starting ${name} on CUDA_VISIBLE_DEVICES=${devices}; log=${logfile}"
            GPU_SMOKE_SKIP_RAY_STOP=1 bash "${script}" \
              --num-gpus "${num_gpus}" \
              --cuda-visible-devices "${devices}" \
              > "${logfile}" 2>&1 &
            pids+=("$!")
            names+=("${name}")
          }

          run_group core "0,1" 2 tests/gpu_smoke/run_gpu_smoke_core.sh
          run_group e2e "2,3" 2 tests/gpu_smoke/run_gpu_smoke_e2e.sh
          run_group reward-e2e "4,5,6,7" 4 tests/gpu_smoke/run_gpu_smoke_reward_e2e.sh

          failed=0
          for i in "${!pids[@]}"; do
            if wait "${pids[$i]}"; then
              echo "[PASS] ${names[$i]}"
            else
              echo "[FAIL] ${names[$i]}"
              failed=1
            fi
          done

          ray stop --force || true
          exit "${failed}"
      - if: always()
        uses: ./.github/actions/gpu-smoke-upload-logs

  gpu_smoke_core_2gpu:
    needs: setup_core_runner
    if: >-
      github.event_name == 'pull_request' &&
      !contains(github.event.pull_request.labels.*.name, 'ready-for-ci') &&
      contains(github.event.pull_request.labels.*.name, 'gpu-smoke-core')
    runs-on: ["${{ needs.setup_core_runner.outputs.core-runner-label || 'L20x2' }}"]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: ./.github/actions/gpu-smoke-prepare
      - name: Run 2-GPU core smoke tests
        run: |
          ray stop --force
          bash tests/gpu_smoke/run_gpu_smoke_core.sh --num-gpus 2
      - if: always()
        uses: ./.github/actions/gpu-smoke-upload-logs

  gpu_smoke_e2e_2gpu:
    needs: setup_e2e_runner
    if: >-
      github.event_name == 'pull_request' &&
      !contains(github.event.pull_request.labels.*.name, 'ready-for-ci') &&
      contains(github.event.pull_request.labels.*.name, 'gpu-smoke-e2e')
    runs-on: ["${{ needs.setup_e2e_runner.outputs.e2e-runner-label || 'L20x2' }}"]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: ./.github/actions/gpu-smoke-prepare
      - name: Run 2-GPU e2e smoke tests
        run: |
          ray stop --force
          bash tests/gpu_smoke/run_gpu_smoke_e2e.sh --num-gpus 2
      - if: always()
        uses: ./.github/actions/gpu-smoke-upload-logs

  gpu_smoke_reward_e2e_4gpu:
    needs: setup_reward_e2e_runner
    if: >-
      github.event_name == 'pull_request' &&
      !contains(github.event.pull_request.labels.*.name, 'ready-for-ci') &&
      contains(github.event.pull_request.labels.*.name, 'gpu-smoke-reward-e2e')
    runs-on: ["${{ needs.setup_reward_e2e_runner.outputs.reward-e2e-runner-label || 'L20x4' }}"]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: ./.github/actions/gpu-smoke-prepare
      - name: Run 4-GPU reward e2e smoke tests
        run: |
          ray stop --force
          bash tests/gpu_smoke/run_gpu_smoke_reward_e2e.sh --num-gpus 4
      - if: always()
        uses: ./.github/actions/gpu-smoke-upload-logs

  cleanup:
    runs-on: ubuntu-latest
    needs:
      - setup_all_runner
      - setup_core_runner
      - setup_e2e_runner
      - setup_reward_e2e_runner
      - gpu_smoke_all_8gpu
      - gpu_smoke_core_2gpu
      - gpu_smoke_e2e_2gpu
      - gpu_smoke_reward_e2e_4gpu
    if: always()
    steps:
      - id: destroy-all-runner
        if: needs.setup_all_runner.outputs.all-mlp-task-id != ''
        uses: volcengine/vemlp-github-runner@v1
        with:
          mode: "destroy"
          faas-url: "${{ env.DYNAMIC_RUNNER_ENDPOINT }}"
          mlp-task-id: "${{ needs.setup_all_runner.outputs.all-mlp-task-id }}"
      - id: destroy-core-runner
        if: needs.setup_core_runner.outputs.core-mlp-task-id != ''
        uses: volcengine/vemlp-github-runner@v1
        with:
          mode: "destroy"
          faas-url: "${{ env.DYNAMIC_RUNNER_ENDPOINT }}"
          mlp-task-id: "${{ needs.setup_core_runner.outputs.core-mlp-task-id }}"
      - id: destroy-e2e-runner
        if: needs.setup_e2e_runner.outputs.e2e-mlp-task-id != ''
        uses: volcengine/vemlp-github-runner@v1
        with:
          mode: "destroy"
          faas-url: "${{ env.DYNAMIC_RUNNER_ENDPOINT }}"
          mlp-task-id: "${{ needs.setup_e2e_runner.outputs.e2e-mlp-task-id }}"
      - id: destroy-reward-e2e-runner
        if: needs.setup_reward_e2e_runner.outputs.reward-e2e-mlp-task-id != ''
        uses: volcengine/vemlp-github-runner@v1
        with:
          mode: "destroy"
          faas-url: "${{ env.DYNAMIC_RUNNER_ENDPOINT }}"
          mlp-task-id: "${{ needs.setup_reward_e2e_runner.outputs.reward-e2e-mlp-task-id }}"
