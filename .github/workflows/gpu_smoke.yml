name: gpu_smoke

on:
  push:
    branches:
      - main
      - v0.*
    paths:
      - "verl_omni/**"
      - "tests/gpu_smoke/**"
      - "tests/agent_loop/**"
      - "tests/reward_loop/**"
      - "tests/workers/**"
      - "tests/special_e2e/**"
      - "pyproject.toml"
      - .github/workflows/gpu_smoke.yml
      - .github/vllm_omni_pin.txt
  pull_request:
    branches:
      - main
      - v0.*
    types: [labeled]
    paths:
      - "verl_omni/**"
      - "tests/gpu_smoke/**"
      - "tests/agent_loop/**"
      - "tests/reward_loop/**"
      - "tests/workers/**"
      - "tests/special_e2e/**"
      - "pyproject.toml"
      - .github/workflows/gpu_smoke.yml
      - .github/vllm_omni_pin.txt

# Cancel jobs on the same ref if a new one is triggered
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Declare permissions just read content.
permissions:
  contents: read

env:
  IMAGE: "verl-ci-cn-beijing.cr.volces.com/verlai/verl:vllm023.dev1"
  DYNAMIC_RUNNER_ENDPOINT: "https://sd7upeujs1b9g1a958pn0.apigateway-cn-beijing.volceapi.com/runner"

jobs:
  setup:
    # Pull request label mapping:
    #   ready-for-ci               -> all GPU smoke groups sequentially on one 4-GPU runner
    #   gpu-smoke-core             -> core groups only
    #   gpu-smoke-e2e              -> e2e group only
    #   gpu-smoke-reward-e2e       -> reward e2e group only
    # Push events also run all groups sequentially on one 4-GPU runner.
    if: >-
      github.repository_owner == 'verl-project' && (
        github.event_name != 'pull_request' ||
        github.event.label.name == 'ready-for-ci' ||
        github.event.label.name == 'gpu-smoke-core' ||
        github.event.label.name == 'gpu-smoke-e2e' ||
        github.event.label.name == 'gpu-smoke-reward-e2e'
      )
    runs-on: ubuntu-latest
    outputs:
      all-runner-label: ${{ steps.create-all-runner.outputs.runner-label }}
      all-mlp-task-id: ${{ steps.create-all-runner.outputs.mlp-task-id }}
      core-single-runner-label: ${{ steps.create-core-single-runner.outputs.runner-label }}
      core-single-mlp-task-id: ${{ steps.create-core-single-runner.outputs.mlp-task-id }}
      core-multi-runner-label: ${{ steps.create-core-multi-runner.outputs.runner-label }}
      core-multi-mlp-task-id: ${{ steps.create-core-multi-runner.outputs.mlp-task-id }}
      e2e-runner-label: ${{ steps.create-e2e-runner.outputs.runner-label }}
      e2e-mlp-task-id: ${{ steps.create-e2e-runner.outputs.mlp-task-id }}
      reward-e2e-runner-label: ${{ steps.create-reward-e2e-runner.outputs.runner-label }}
      reward-e2e-mlp-task-id: ${{ steps.create-reward-e2e-runner.outputs.mlp-task-id }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: create-all-runner
        if: >-
          github.event_name != 'pull_request' ||
          github.event.label.name == 'ready-for-ci'
        uses: volcengine/vemlp-github-runner@v1
        with:
          mode: "create"
          faas-url: "${{ env.DYNAMIC_RUNNER_ENDPOINT }}"
          mlp-image: "${{ env.IMAGE }}"
      - id: create-core-single-runner
        if: >-
          github.event_name == 'pull_request' &&
          github.event.label.name == 'gpu-smoke-core'
        uses: volcengine/vemlp-github-runner@v1
        with:
          mode: "create"
          faas-url: "${{ env.DYNAMIC_RUNNER_ENDPOINT }}"
          mlp-image: "${{ env.IMAGE }}"
      - id: create-core-multi-runner
        if: >-
          github.event_name == 'pull_request' &&
          github.event.label.name == 'gpu-smoke-core'
        uses: volcengine/vemlp-github-runner@v1
        with:
          mode: "create"
          faas-url: "${{ env.DYNAMIC_RUNNER_ENDPOINT }}"
          mlp-image: "${{ env.IMAGE }}"
      - id: create-e2e-runner
        if: >-
          github.event_name == 'pull_request' &&
          github.event.label.name == 'gpu-smoke-e2e'
        uses: volcengine/vemlp-github-runner@v1
        with:
          mode: "create"
          faas-url: "${{ env.DYNAMIC_RUNNER_ENDPOINT }}"
          mlp-image: "${{ env.IMAGE }}"
      - id: create-reward-e2e-runner
        if: >-
          github.event_name == 'pull_request' &&
          github.event.label.name == 'gpu-smoke-reward-e2e'
        uses: volcengine/vemlp-github-runner@v1
        with:
          mode: "create"
          faas-url: "${{ env.DYNAMIC_RUNNER_ENDPOINT }}"
          mlp-image: "${{ env.IMAGE }}"

  gpu_smoke_all_4gpu:
    needs: setup
    if: >-
      github.event_name != 'pull_request' ||
      github.event.label.name == 'ready-for-ci'
    runs-on: ["${{ needs.setup.outputs.all-runner-label || 'L20x4' }}"]
    timeout-minutes: 90
    env:
      HTTPS_PROXY: ${{ secrets.PROXY_HTTPS }}
      NO_PROXY: "localhost,127.0.0.1,hf-mirror.com"
      HF_ENDPOINT: "https://hf-mirror.com"
      HF_HUB_ENABLE_HF_TRANSFER: "0"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Install dependencies
        env:
          PIP_EXTRA_INDEX_URL: https://pypi.org/simple
        run: |
          # vllm020.dev1 image PyPI mirror may lag pypi.org (e.g. kernels, fa3-fwd).
          pip3 install ".[gpu,dev]"
          pip3 install "vllm-omni @ git+https://github.com/vllm-project/vllm-omni.git@$(cat .github/vllm_omni_pin.txt)"
          pip3 install --no-deps --force-reinstall "verl @ git+https://github.com/verl-project/verl.git@$(cat .github/verl_pin.txt)"
          pip3 install --no-deps -e .
          # veomni's [gpu] extra pins torch 2.9 and would conflict with the vLLM stack.
          # See docs/start/install.md "Optional engine backends".
          # TODO: rm --no-deps when VeOmni support torch2.11
          pip3 install veomni==0.1.11 --no-deps
          pip3 install torchcodec librosa soundfile av
      - name: Run all GPU smoke tests sequentially
        run: |
          ray stop --force
          bash tests/gpu_smoke/run_gpu_smoke_core_single.sh --num-gpus 1
          bash tests/gpu_smoke/run_gpu_smoke_core_multi.sh --num-gpus 2
          bash tests/gpu_smoke/run_gpu_smoke_e2e.sh --num-gpus 2
          bash tests/gpu_smoke/run_gpu_smoke_reward_e2e.sh --num-gpus 4
      - name: Upload GPU smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gpu-smoke-logs-${{ github.job }}
          path: logs/gpu_smoke/**
          if-no-files-found: ignore

  gpu_smoke_core_single_1gpu:
    needs: setup
    if: >-
      github.event_name == 'pull_request' &&
      github.event.label.name == 'gpu-smoke-core'
    runs-on: ["${{ needs.setup.outputs.core-single-runner-label || 'L20x1' }}"]
    timeout-minutes: 30
    env:
      HTTPS_PROXY: ${{ secrets.PROXY_HTTPS }}
      NO_PROXY: "localhost,127.0.0.1,hf-mirror.com"
      HF_ENDPOINT: "https://hf-mirror.com"
      HF_HUB_ENABLE_HF_TRANSFER: "0"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Install dependencies
        env:
          PIP_EXTRA_INDEX_URL: https://pypi.org/simple
        run: |
          # vllm020.dev1 image PyPI mirror may lag pypi.org (e.g. kernels, fa3-fwd).
          pip3 install ".[gpu,dev]"
          pip3 install "vllm-omni @ git+https://github.com/vllm-project/vllm-omni.git@$(cat .github/vllm_omni_pin.txt)"
          pip3 install --no-deps --force-reinstall "verl @ git+https://github.com/verl-project/verl.git@$(cat .github/verl_pin.txt)"
          pip3 install --no-deps -e .
          # veomni's [gpu] extra pins torch 2.9 and would conflict with the vLLM stack.
          # See docs/start/install.md "Optional engine backends".
          # TODO: rm --no-deps when VeOmni support torch2.11
          pip3 install veomni==0.1.11 --no-deps
          pip3 install torchcodec librosa soundfile av
      - name: Run 1-GPU core smoke tests
        run: |
          ray stop --force
          bash tests/gpu_smoke/run_gpu_smoke_core_single.sh --num-gpus 1
      - name: Upload GPU smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gpu-smoke-logs-${{ github.job }}
          path: logs/gpu_smoke/**
          if-no-files-found: ignore

  gpu_smoke_core_multi_2gpu:
    needs: setup
    if: >-
      github.event_name == 'pull_request' &&
      github.event.label.name == 'gpu-smoke-core'
    runs-on: ["${{ needs.setup.outputs.core-multi-runner-label || 'L20x2' }}"]
    timeout-minutes: 30
    env:
      HTTPS_PROXY: ${{ secrets.PROXY_HTTPS }}
      NO_PROXY: "localhost,127.0.0.1,hf-mirror.com"
      HF_ENDPOINT: "https://hf-mirror.com"
      HF_HUB_ENABLE_HF_TRANSFER: "0"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Install dependencies
        env:
          PIP_EXTRA_INDEX_URL: https://pypi.org/simple
        run: |
          # vllm020.dev1 image PyPI mirror may lag pypi.org (e.g. kernels, fa3-fwd).
          pip3 install ".[gpu,dev]"
          pip3 install "vllm-omni @ git+https://github.com/vllm-project/vllm-omni.git@$(cat .github/vllm_omni_pin.txt)"
          pip3 install --no-deps --force-reinstall "verl @ git+https://github.com/verl-project/verl.git@$(cat .github/verl_pin.txt)"
          pip3 install --no-deps -e .
          # veomni's [gpu] extra pins torch 2.9 and would conflict with the vLLM stack.
          # See docs/start/install.md "Optional engine backends".
          # TODO: rm --no-deps when VeOmni support torch2.11
          pip3 install veomni==0.1.11 --no-deps
          pip3 install torchcodec librosa soundfile av
      - name: Run 2-GPU core multi-worker smoke tests
        run: |
          ray stop --force
          bash tests/gpu_smoke/run_gpu_smoke_core_multi.sh --num-gpus 2
      - name: Upload GPU smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gpu-smoke-logs-${{ github.job }}
          path: logs/gpu_smoke/**
          if-no-files-found: ignore

  gpu_smoke_e2e_2gpu:
    needs: setup
    if: >-
      github.event_name == 'pull_request' &&
      github.event.label.name == 'gpu-smoke-e2e'
    runs-on: ["${{ needs.setup.outputs.e2e-runner-label || 'L20x2' }}"]
    timeout-minutes: 45
    env:
      HTTPS_PROXY: ${{ secrets.PROXY_HTTPS }}
      NO_PROXY: "localhost,127.0.0.1,hf-mirror.com"
      HF_ENDPOINT: "https://hf-mirror.com"
      HF_HUB_ENABLE_HF_TRANSFER: "0"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Install dependencies
        env:
          PIP_EXTRA_INDEX_URL: https://pypi.org/simple
        run: |
          # vllm023.dev1 image PyPI mirror may lag pypi.org (e.g. kernels, fa3-fwd).
          pip3 install ".[gpu,dev]"
          pip3 install "vllm-omni @ git+https://github.com/vllm-project/vllm-omni.git@$(cat .github/vllm_omni_pin.txt)"
          pip3 install --no-deps --force-reinstall "verl @ git+https://github.com/verl-project/verl.git@$(cat .github/verl_pin.txt)"
          pip3 install --no-deps -e .
          # veomni's [gpu] extra pins torch 2.9 and would conflict with the vLLM stack.
          # See docs/start/install.md "Optional engine backends".
          # TODO: rm --no-deps when VeOmni support torch2.11
          pip3 install veomni==0.1.11 --no-deps
          pip3 install torchcodec librosa soundfile av
          pip3 install "transformers[mistral-common]"
      - name: Run GPU smoke tests
        run: |
          ray stop --force
          bash tests/gpu_smoke/run_gpu_smoke_e2e.sh --num-gpus 2
      - name: Upload GPU smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gpu-smoke-logs-${{ github.job }}
          path: logs/gpu_smoke/**
          if-no-files-found: ignore

  gpu_smoke_reward_e2e_4gpu:
    needs: setup
    if: >-
      github.event_name == 'pull_request' &&
      github.event.label.name == 'gpu-smoke-reward-e2e'
    runs-on: ["${{ needs.setup.outputs.reward-e2e-runner-label || 'L20x4' }}"]
    timeout-minutes: 45
    env:
      HTTPS_PROXY: ${{ secrets.PROXY_HTTPS }}
      NO_PROXY: "localhost,127.0.0.1,hf-mirror.com"
      HF_ENDPOINT: "https://hf-mirror.com"
      HF_HUB_ENABLE_HF_TRANSFER: "0"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Install dependencies
        env:
          PIP_EXTRA_INDEX_URL: https://pypi.org/simple
        run: |
          # vllm020.dev1 image PyPI mirror may lag pypi.org (e.g. kernels, fa3-fwd).
          pip3 install ".[gpu,dev]"
          pip3 install "vllm-omni @ git+https://github.com/vllm-project/vllm-omni.git@$(cat .github/vllm_omni_pin.txt)"
          pip3 install --no-deps --force-reinstall "verl @ git+https://github.com/verl-project/verl.git@$(cat .github/verl_pin.txt)"
          pip3 install --no-deps -e .
          # veomni's [gpu] extra pins torch 2.9 and would conflict with the vLLM stack.
          # See docs/start/install.md "Optional engine backends".
          # TODO: rm --no-deps when VeOmni support torch2.11
          pip3 install veomni==0.1.11 --no-deps
          pip3 install torchcodec librosa soundfile av
      - name: Run 4-GPU reward e2e smoke tests
        run: |
          ray stop --force
          bash tests/gpu_smoke/run_gpu_smoke_reward_e2e.sh --num-gpus 4
      - name: Upload GPU smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gpu-smoke-logs-${{ github.job }}
          path: logs/gpu_smoke/**
          if-no-files-found: ignore

  cleanup:
    runs-on: ubuntu-latest
    needs: [setup, gpu_smoke_all_4gpu, gpu_smoke_core_single_1gpu, gpu_smoke_core_multi_2gpu, gpu_smoke_e2e_2gpu, gpu_smoke_reward_e2e_4gpu]
    if: always()
    steps:
      - id: destroy-all-runner
        if: needs.setup.outputs.all-mlp-task-id != ''
        uses: volcengine/vemlp-github-runner@v1
        with:
          mode: "destroy"
          faas-url: "${{ env.DYNAMIC_RUNNER_ENDPOINT }}"
          mlp-task-id: "${{ needs.setup.outputs.all-mlp-task-id }}"
      - id: destroy-core-single-runner
        if: needs.setup.outputs.core-single-mlp-task-id != ''
        uses: volcengine/vemlp-github-runner@v1
        with:
          mode: "destroy"
          faas-url: "${{ env.DYNAMIC_RUNNER_ENDPOINT }}"
          mlp-task-id: "${{ needs.setup.outputs.core-single-mlp-task-id }}"
      - id: destroy-core-multi-runner
        if: needs.setup.outputs.core-multi-mlp-task-id != ''
        uses: volcengine/vemlp-github-runner@v1
        with:
          mode: "destroy"
          faas-url: "${{ env.DYNAMIC_RUNNER_ENDPOINT }}"
          mlp-task-id: "${{ needs.setup.outputs.core-multi-mlp-task-id }}"
      - id: destroy-e2e-runner
        if: needs.setup.outputs.e2e-mlp-task-id != ''
        uses: volcengine/vemlp-github-runner@v1
        with:
          mode: "destroy"
          faas-url: "${{ env.DYNAMIC_RUNNER_ENDPOINT }}"
          mlp-task-id: "${{ needs.setup.outputs.e2e-mlp-task-id }}"
      - id: destroy-reward-e2e-runner
        if: needs.setup.outputs.reward-e2e-mlp-task-id != ''
        uses: volcengine/vemlp-github-runner@v1
        with:
          mode: "destroy"
          faas-url: "${{ env.DYNAMIC_RUNNER_ENDPOINT }}"
          mlp-task-id: "${{ needs.setup.outputs.reward-e2e-mlp-task-id }}"
